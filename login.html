<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login — Weather App</title>

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- Tabler Icons -->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <div class="navbar">

        <a class="logo" href="index.html">

            Weather App

        </a>

        <nav>

            <a href="index.html">

                Home

            </a>

            <a href="Login.html" class="active">

                Login

            </a>

            <a href="signup.html">

                Signup

            </a>

        </nav>

    </div>

    <!-- ================= AUTH PAGE ================= -->

    <div class="auth-page">

        <div class="auth-box">

            <p class="auth-eyebrow">

                Welcome back

            </p>

            <h2>

                Log in to your account

            </h2>

            <!-- ================= ALERT ================= -->

            <div class="alert" id="alertBox">

                <i class="ti ti-alert-circle"></i>

                <span id="alertMsg"></span>

            </div>

            <!-- ================= USERNAME ================= -->

            <div class="field">

                <label for="username">

                    Username

                </label>

                <div class="input-wrap">

                    <i class="ti ti-user"></i>

                    <input type="text" id="username" placeholder="Enter your username" autocomplete="username">

                </div>

            </div>

            <!-- ================= PASSWORD ================= -->

            <div class="field">

                <label for="password">

                    Password

                </label>

                <div class="input-wrap">

                    <i class="ti ti-lock"></i>

                    <input type="password" id="password" placeholder="Enter your password"
                        autocomplete="current-password">

                    <button class="toggle-pw" id="togglePw" type="button">

                        <i class="ti ti-eye" id="eyeIcon"></i>

                    </button>

                </div>

            </div>

            <!-- ================= FORGOT ================= -->

            <a href="#" class="forgot">

                Forgot password?

            </a>

            <!-- ================= BUTTON ================= -->

            <button id="loginBtn">

                <i class="ti ti-login"></i>

                Login

            </button>

            <!-- ================= DIVIDER ================= -->

            <div class="divider">

                <span>

                    don't have an account?

                </span>

            </div>

            <!-- ================= SIGNUP ================= -->

            <p class="auth-link">

                New here?

                <a href="signup.html">

                    Create an account

                </a>

            </p>

        </div>

    </div>

    <!-- ================= SCRIPT ================= -->

    <script src="script.js"></script>

</body>

</html>
